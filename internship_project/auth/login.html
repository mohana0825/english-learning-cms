<!DOCTYPE html>
<html>
<head>
    <title>KETA Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row vh-100">

        <!-- LEFT SIDE -->
        <div class="col-md-6 bg-light d-flex flex-column justify-content-center align-items-center">

            <img src="../assets/images/keta_logo.png"
                 alt="KETA Logo"
                 width="220"
                 class="mb-4">

            <h3>English Learning CMS</h3>

            <p class="text-center px-5">
                Admin panel to manage categories and learning content using PHP & MySQL.
            </p>

        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">

            <div class="card shadow p-4" style="width: 380px;">

                <h3 class="text-center mb-4">Admin Login</h3>

                <!-- LOGIN FORM -->
                <form action="login.php" method="POST">

                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
